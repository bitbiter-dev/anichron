services:
  anichron-db:
    image: postgres:17-alpine
    container_name: anichron-db
    restart: always
    environment:
      POSTGRES_USER: anichron_admin
      POSTGRES_PASSWORD: ${DB_PW}
      POSTGRES_DB: anichron
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anichron_admin -d anichron"]
      interval: 10s
      timeout: 5s
      retries: 5

  anichron-api:
    image: yourregistry.azurecr.io/anichron-api:latest
    container_name: anichron-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - POSTGRES_CONNECTION__HOST=anichron-db
      - POSTGRES_CONNECTION__DBNAME=anichron
      - POSTGRES_CONNECTION__PORT=5432
      - POSTGRES_CONNECTION__USER=anichron_admin
      - POSTGRES_CONNECTION__PASSWORD=${DB_PW}
      # Optional: Use this if you implement Docker Secrets later
      # - POSTGRES_CONNECTION__PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - /path/to/your/nas:/data/originals:ro # NAS Mount (Read-Only)
      - ${BASE_PATH}/anichron/proxy_cache:/data/proxies # Proxy Cache (Read-Only)
    depends_on:
      anichron-db:
        condition: service_healthy

  anichron-worker:
    image: yourregistry.azurecr.io/anichron-worker:latest
    container_name: anichron-worker
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    environment:
      - POSTGRES_CONNECTION__HOST=anichron-db
      - POSTGRES_CONNECTION__DBNAME=anichron
      - POSTGRES_CONNECTION__PORT=5432
      - POSTGRES_CONNECTION__USER=anichron_admin
      - POSTGRES_CONNECTION__PASSWORD=${DB_PW}
      # Optional: Use this if you implement Docker Secrets later
      # - POSTGRES_CONNECTION__PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - /path/to/your/nas:/data/originals:ro
      - ${BASE_PATH}/anichron/proxy_cache:/data/proxies:rw
    depends_on:
      anichron-db:
        condition: service_healthy