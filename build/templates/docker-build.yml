parameters:
- name: containerRegistry
  displayName: Name of Container Registry
  type: string
- name: repositoryName
  displayName: Name of Docker Repository
  type: string
- name: buildContext
  displayName: Path to build context from where the dockerfile is built
  type: string
- name: dockerfilePath
  displayName: Path to Dockerfile
  type: string
- name: imageTag
  displayName: Tag for the Container
  type: string
- name: additionalTag
  displayName: Additional tag for the Container
  type: string

steps:
  - task: Docker@2
    displayName: Build Container
    inputs:
      command: 'build'
      repository: '${{ parameters.repositoryName }}'
      buildContext: '${{ parameters.buildContext }}'
      dockerfile: '${{ parameters.dockerfilePath }}'
      tags: |
          ${{ parameters.imageTag }}
          ${{ parameters.additionalTag }}
      addPipelineData: true
      arguments: '--cache-from ${{ parameters.repositoryName }}:latest --progress=plain | tee $(Agent.TempDirectory)/docker_build.log'
    name: DockerBuild

  - task: Bash@3
    displayName: 'Log Docker Build Warnings'
    inputs:
      targetType: 'inline'
      script: |
        LOG_FILE="$(Agent.TempDirectory)/docker_build.log"
        echo "Reading Docker build output from: $LOG_FILE"
        if [ -f "$LOG_FILE" ]; then
          while IFS= read -r line; do
            if echo "$line" | grep -qi "warning"; then
              echo "##vso[task.logissue type=warning]$line"
            fi
            echo "$line"
          done < "$LOG_FILE"
        else
          echo "Docker build output file not found: $LOG_FILE"
        fi
      
  - task: BuildQualityChecks@9
    displayName: 'Check build quality'
    inputs:
      runTitle: 'Build Warnings'
      checkWarnings: true
      showStatistics: true
      includePartiallySucceeded: true
      baseBranchRef: '$(System.PullRequest.TargetBranch)'
      checkCoverage: false
      warningTaskSelectors: '/^(Build\s+Container|Log\s+Docker\s+Build\s+Warnings)$/i'
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))

  - task: Docker@2
    displayName: Push Container
    inputs:
      containerRegistry: '${{ parameters.containerRegistry }}'
      repository: '${{ parameters.repositoryName }}'
      command: 'push'
      tags: |
          ${{ parameters.imageTag }}
          ${{ parameters.additionalTag }}