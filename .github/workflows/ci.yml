name: CI

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: Push images to Docker Hub
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/

      - name: Test
        run: dotnet test src/ --no-build --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: 'coverage/**/coverage.cobertura.xml'
          targetdir: 'coverage/report'
          reporttypes: 'HtmlInline_AzurePipelines;MarkdownSummaryGithub;Badges'
          verbosity: 'Warning'

      - name: Publish coverage summary
        if: always()
        run: cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report/
          retention-days: 30

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges:badges 2>/dev/null || true
          git checkout badges 2>/dev/null || git checkout --orphan badges
          git rm -rf . --quiet 2>/dev/null || true
          cp coverage/report/badge_linecoverage.svg coverage.svg
          git add coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge"
          git push --force origin badges

      - name: Check formatting
        run: dotnet format --verify-no-changes src/

  docker:
    name: Docker — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API
            repo: anichron-api
            dockerfile: src/Anichron.API/Dockerfile
          - name: Worker
            repo: anichron-worker
            dockerfile: src/Anichron.Worker/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.repo }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: src
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || inputs.push_to_registry == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.repo }}:edge
          cache-to: type=inline
          provenance: false
