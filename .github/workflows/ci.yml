name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: Push images to Docker Hub
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet build src/
      - run: dotnet test src/ --no-build

  docker:
    name: Docker — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        include:
          - name: API
            repo: anichron-api
            dockerfile: src/Anichron.API/Dockerfile
          - name: Worker
            repo: anichron-worker
            dockerfile: src/Anichron.Worker/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.repo }}"
          VERSION="0.0.${{ github.run_number }}"
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:${VERSION}-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: src
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/master' || inputs.push_to_registry == true }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.repo }}:latest
          cache-to: type=inline
          provenance: false
